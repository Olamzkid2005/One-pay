[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E711",   # comparison to None (SQLAlchemy uses == None)
    "E712",   # comparison to True/False
    "F401",   # unused imports (too many false positives in __init__.py)
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E501", "F401"]
"tests/**/*.py" = ["F401", "F811"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
