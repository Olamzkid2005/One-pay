<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}OnePay{% endblock %}</title>
    
    <script nonce="{{ g.csp_nonce }}">
        // Check localStorage for theme preference, default to light
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <!-- Tailwind CSS (built locally via `npm run build:css` → static/css/output.css) -->
    <!-- If output.css doesn't exist yet, run: npm run build:css -->
    <!-- Fallback CDN (uncomment if build hasn't run): -->
    <!-- <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script> -->
    <link rel="stylesheet" href="{{ hashed_url('css/output.css') }}">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(28, 32, 38, 0.7);
            backdrop-filter: blur(40px);
        }
        .cloud-shadow {
            box-shadow: 0 64px 64px -12px rgba(10, 14, 20, 0.4);
        }
        .gradient-cta {
            background: linear-gradient(135deg, #aac7ff 0%, #418fff 100%);
        }
        /* Light mode deeper red for error text */
        :root:not(.dark) .text-error {
            color: #b91c1c;
        }
    </style>
    {% block extra_styles %}{% endblock %}
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-background text-gray-900 dark:text-on-surface font-body min-h-screen flex flex-col selection:bg-primary/30 antialiased">
    <div id="toast-container"></div>
    {% block body %}{% endblock %}
    
    <!-- Dark/Light Mode Toggle -->
    <button id="theme-toggle" aria-label="Toggle dark/light mode" class="fixed top-6 right-6 z-50 p-3 rounded-full bg-surface-container-high/80 dark:bg-surface-variant/80 backdrop-blur-md editorial-shadow hover:scale-110 active:scale-95 transition-all outline-none">
        <span id="theme-toggle-dark-icon" class="hidden material-symbols-outlined text-outline">light_mode</span>
        <span id="theme-toggle-light-icon" class="hidden material-symbols-outlined text-outline">dark_mode</span>
    </button>
    
    <!-- Loading states utility (must load before page-specific scripts) -->
    <script src="{{ hashed_url('js/loading-states.js') }}" defer></script>
    {% block scripts %}{% endblock %}
    
    <script nonce="{{ g.csp_nonce }}">
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        
        // Initial icon state
        if (document.documentElement.classList.contains('dark')) {
            darkIcon.classList.remove('hidden');
        } else {
            lightIcon.classList.remove('hidden');
        }
        
        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');
            
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
