global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'onepay-monitor'

scrape_configs:
  - job_name: 'onepay'
    static_configs:
      - targets: ['host.docker.internal:5000']
        labels:
          service: 'onepay-api'
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
