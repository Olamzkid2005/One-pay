[pytest]
# Pytest configuration for OnePay

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    oauth: Google OAuth tests
    slow: Slow running tests

# Minimum Python version
minversion = 3.11
