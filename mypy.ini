[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

# Gradual typing — enable checking for core modules
[mypy-core.*]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-blueprints.*]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-services.*]
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-models.*]
ignore_errors = True

[mypy-alembic.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True
